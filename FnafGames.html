<!DOCTYPE html>
<html>
    <head>
        <title>Fnaf Games</title>
        <style>
            * {
                font-family: arial;
            }
            body {
                margin: 0;
                padding: 20px; /* espacio arriba */
                text-align: center; /* centra el contenido horizontal */
            }
            .logos {
                display: flex;
                justify-content: center; /* centra las imágenes */
                gap: 10px;
                margin-bottom: 15px;
            }
            .wbfs, .wup {
                min-width: 64px;
                border: none;
                margin-top: 6px;
                margin-bottom: 6px;
                height: 36px;
                border-radius: 4px;
                font-family: "Google Sans", Roboto, Arial, sans-serif;
                font-size: 15px;
                font-weight: 500;
                padding: 0 24px;
                box-sizing: border-box;
                background-color: rgb(26, 115, 232);
                color: #fff;
                cursor: pointer;
            }
            .buttons {
                margin-top: 15px;
            }
        </style>
    </head>
    <body>
        <div class="logos">
            <img src="img/Logo Lorenzo/Gorilmoncat + logo gameoverdeluxe2.png" width="50"alt="logo">
            <img src="img/Logo Lorenzo/Gameoverdeluxe2 logo blanco y rojo.png" width="150"alt="logo">
        </div>
        <h1>Fnaf Games</h1>
        <div class="buttons">
            <button class="wbfs" type="button" onclick="location.href='https://www.mediafire.com/file/uaaprgxzref1y9a/Five_Nights_at_Freddys_2.exe/file'">Fnaf 2</button>
            <button class="wbfs" type="button" onclick="location.href='https://www.mediafire.com/file/qzjlp0b1x6ngoeh/Another_Fnaf_Fangame_Open_Source_Setup.exe/file'">Another Fnaf Fangame Open Source</button>
        </div>
    </body>
</html>
