<!DOCTYPE html>
<html>
    <head>
        <title>Hello Neighbor Games</title>
        <link rel="icon" href="img/Logo Lorenzo/Gorilmoncat.png" type="image/png">
        <style>
            * {
                font-family: arial;
            }
            body {
                margin: 0;
                padding: 20px; /* espacio arriba */
                text-align: center; /* centra el contenido horizontal */
            }
            .logos {
                display: flex;
                justify-content: center; /* centra las imágenes */
                gap: 10px;
                margin-bottom: 15px;
            }
            .wbfs, .wup {
                min-width: 64px;
                border: none;
                margin-top: 6px;
                margin-bottom: 6px;
                height: 36px;
                border-radius: 4px;
                font-family: "Google Sans", Roboto, Arial, sans-serif;
                font-size: 15px;
                font-weight: 500;
                padding: 0 24px;
                box-sizing: border-box;
                background-color: rgb(26, 115, 232);
                color: #fff;
                cursor: pointer;
            }
            .buttons {
                margin-top: 15px;
            }
        </style>
    </head>
    <body>
        <div class="logos">
            <img src="img/Logo Lorenzo/Gorilmoncat + logo gameoverdeluxe2.png" width="50"alt="logo">
            <img src="img/Logo Lorenzo/Gameoverdeluxe2 logo blanco y rojo.png" width="150"alt="logo">
        </div>
        <h1>Hello Neighbor Games</h1>
        <div class="buttons">
          <button class="wbfs" type="button" onclick="location.href='https://www.mediafire.com/file/apmswlsnxbonvun/Hello_Neighbor_Setup.zip/file'">Hello Neighbor</button>
          <button class="wbfs" type="button" onclick="location.href='https://www.mediafire.com/file/pkkjv46f23xe2qk/Hello_Neighbor_2_Setup.zip/file'">Hello Neighbor 2</button>
          <button class="wbfs" type="button" onclick="location.href='https://www.mediafire.com/file/o5id3v9ls2msi2c/Hello_Neighbor_Hide_and_Seek_Setup.exe/file'">Hello Neighbor Hide and Seek</button>
        </div>
    </body>
</html>
